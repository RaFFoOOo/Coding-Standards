name: CI - Preview on Azure Static Web Apps

on:
  workflow_dispatch:
  # Auto-deploy a preview whenever frontend (or this pipeline) changes on an active
  # feature branch. Branch prefixes are mandated by stack-github-actions.md §1; `main`
  # is intentionally excluded (it goes through cd-angular-azure-static-web-apps.yml).
  push:
    branches:
      - 'feature/**'
      - 'chore/**'
      - 'bugfix/**'
      - 'refactor/**'
      - 'sprint/**'
      - 'task/**'
    paths:
      - 'lc-webapp/**'
      - '.github/workflows/ci-preview-swa.yml'
      - '.github/workflows/shared-build-angular.yml'
      - '.github/actions/deploy-swa/**'

# Shared preview slot — a newer push supersedes an in-flight preview deploy.
concurrency:
  group: ci-preview-swa
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    uses: ./.github/workflows/shared-build-angular.yml
    with:
      node-version: ${{ vars.NODE_VERSION || '24' }}
      working-directory: ${{ vars.ANGULAR_WORKING_DIRECTORY || './lc-webapp' }}
      # Angular CLI configuration (`--configuration`), NOT a GitHub environment.
      # MUST be `production` for any deployed bundle: the `development` config bakes
      # in environment.development.ts (apiBaseUrl http://localhost:7071) — a preview
      # built with it calls localhost and is CSP-blocked. The production config emits
      # __API_BASE_URL__ / __MSAL_*__ token placeholders that the deploy step fills
      # from the development-scoped vars below.
      environment: production
      deploy-tag-prefix: 'ci-azure-swa'
      deploy-tag-suffix: ${{ github.ref_name }}
    secrets: inherit

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Deploy Preview to SWA
        id: deploy
        uses: ./.github/actions/deploy-swa
        with:
          enable-tenant-selector: ${{ vars.ENABLE_TENANT_SELECTOR }}
          enable-login-features: ${{ vars.ENABLE_LOGIN_FEATURES }}
          build-version: ${{ needs.build.outputs.build-tag }}
          # Development-scoped values (job is bound to environment: development) — point
          # the preview at the dev Function App + dev MSAL app registration, NOT localhost.
          msal-client-id: ${{ vars.MSAL_CLIENT_ID }}
          msal-authority: ${{ vars.MSAL_AUTHORITY }}
          msal-api-scope: ${{ vars.MSAL_API_SCOPE }}
          api-base-url: ${{ vars.API_BASE_URL }}
          tenant-key: ${{ vars.TENANT_KEY }}
          swa-deployment-token: ${{ secrets.CI_AZURE_SWA_DEPLOYMENT_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deployment-environment: preview

      - name: Post Preview URL as PR Comment
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            const buildTag = '${{ needs.build.outputs.build-tag }}';
            const previewUrl = '${{ steps.deploy.outputs.static_web_app_url }}';

            // Find open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              core.info(`No open PR found for branch ${branch} — skipping comment.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs[0].number,
              body: [
                '### Preview Deployment Ready',
                '',
                `**URL:** ${previewUrl}`,
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**Build Tag:** \`${buildTag}\``,
                '',
                '_This is a shared preview slot — the latest push overwrites the previous preview._'
              ].join('\n')
            });
