name: CI - Preview on Azure Static Web Apps

on:
  # Cost-reduction policy (stack-github-actions.md §1 rev.4 — 2026-07-08): previews trigger
  # automatically on push to `main` (path-filtered to Angular-relevant changes) or on demand via
  # workflow_dispatch for any other branch. There is no preview backend slot, so every automatic
  # preview builds fully-Mocked (environment.preview.ts) — a UX-only sandbox, never calling the
  # real dev backend. Validating against the real dev backend is done via the `development`
  # environment/config instead (local `ng serve` or a manual `build-config: production` dispatch),
  # never this shared preview slot. The push trigger stays narrowly scoped to `main` + the paths
  # below rather than every branch, since GitHub Actions minutes are a hard, exhaustible cap on
  # this Free private repo. Dispatch from the GitHub Actions tab to preview a non-main branch.
  push:
    branches:
      - main
    paths:
      - 'lc-webapp/**'
      - '.github/workflows/ci-preview-swa.yml'
      - '.github/workflows/shared-build-angular.yml'
  workflow_dispatch:
    inputs:
      build-config:
        description: >
          Angular build configuration. "production" calls the real dev Function App/DB (needs it
          redeployed with matching backend endpoints to work). "preview" is fully Mock — every
          service serves static/in-memory data, no backend dependency at all — for isolated FE-only
          verification (style, layout, interaction flows) independent of backend deploy state.
        type: choice
        options:
          - production
          - preview
        default: preview   # preview shares the dev Function App with the "development" env —
                            # default to the Mock build so ad-hoc previews validate FE only

# Shared preview slot — a newer push supersedes an in-flight preview deploy.
concurrency:
  group: ci-preview-swa
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    uses: ./.github/workflows/shared-build-angular.yml
    with:
      node-version: ${{ vars.NODE_VERSION || '24' }}
      working-directory: ${{ vars.ANGULAR_WORKING_DIRECTORY || './lc-webapp' }}
      # Angular CLI configuration (`--configuration`), NOT a GitHub environment.
      # NEVER `development`: that config bakes in environment.development.ts
      # (apiBaseUrl http://localhost:7071) — a preview built with it calls localhost and is
      # CSP-blocked. "production" emits __API_BASE_URL__ / __MSAL_*__ token placeholders
      # that the deploy step below fills from the development-scoped vars (real dev backend).
      # "preview" (environment.preview.ts, all services Mock) hardcodes its own dummy values
      # instead of those tokens, so the same deploy-step substitution below is a harmless
      # no-op for it — no separate deploy path needed per config.
      environment: ${{ inputs.build-config || 'preview' }}
      deploy-tag-prefix: 'ci-azure-swa'
      deploy-tag-suffix: ${{ github.ref_name }}
    secrets: inherit

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Deploy Preview to SWA
        id: deploy
        uses: ./.github/actions/deploy-swa
        with:
          enable-tenant-selector: ${{ vars.ENABLE_TENANT_SELECTOR }}
          enable-login-features: ${{ vars.ENABLE_LOGIN_FEATURES }}
          build-version: ${{ needs.build.outputs.build-tag }}
          # Development-scoped values (job is bound to environment: development) — point
          # the preview at the dev Function App + dev MSAL app registration, NOT localhost.
          msal-client-id: ${{ vars.MSAL_CLIENT_ID }}
          msal-authority: ${{ vars.MSAL_AUTHORITY }}
          msal-api-scope: ${{ vars.MSAL_API_SCOPE }}
          api-base-url: ${{ vars.API_BASE_URL }}
          tenant-key: ${{ vars.TENANT_KEY }}
          swa-deployment-token: ${{ secrets.CI_AZURE_SWA_DEPLOYMENT_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deployment-environment: preview

      - name: Post Preview URL as PR Comment
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            const buildTag = '${{ needs.build.outputs.build-tag }}';
            const previewUrl = '${{ steps.deploy.outputs.static_web_app_url }}';

            // Find open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              core.info(`No open PR found for branch ${branch} — skipping comment.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs[0].number,
              body: [
                '### Preview Deployment Ready',
                '',
                `**URL:** ${previewUrl}`,
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**Build Tag:** \`${buildTag}\``,
                `**Build Config:** \`${{ inputs.build-config || 'production' }}\``,
                '',
                '_This is a shared preview slot — the latest push overwrites the previous preview._'
              ].join('\n')
            });
