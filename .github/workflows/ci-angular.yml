name: CI - Angular Build Validations

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  validate-build:
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    uses: ./.github/workflows/shared-build-angular.yml
    with:
      node-version: ${{ vars.NODE_VERSION || '20' }}
      working-directory: ${{ vars.ANGULAR_WORKING_DIRECTORY || '.' }}
    secrets:
      AZURE_STORAGE_BASE_URL: ${{ secrets.AZURE_STORAGE_BASE_URL }}
      AZURE_STORAGE_IMG_BASE_PATH: ${{ secrets.AZURE_STORAGE_IMG_BASE_PATH }}
      AZURE_STORAGE_IMG_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_IMG_SAS_TOKEN }}
