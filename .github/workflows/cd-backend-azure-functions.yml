name: CD - Deploy to Azure Function App

on:
  push:
    branches:
      - main
    paths:
      - 'lc-services/**'
      - '.github/workflows/cd-backend-azure-functions.yml'
      - '.github/workflows/shared-build-dotnet.yml'
  workflow_dispatch:
    inputs:
      target-env:
        description: 'Target environment(s). "both" = build once → deploy-dev → smoke → deploy-prod (smoke gates the promotion; deploy-prod runs only via manual dispatch).'
        type: choice
        options:
          - development
          - production
          - both
        default: development
        required: true

permissions:
  contents: read

# Build once / deploy multiple — the build job emits a single .NET publish
# artifact that both deploy-dev and deploy-prod consume, so the binaries are
# byte-identical across environments. `workflow_dispatch target-env=both`
# chains the deploys through the dev smoke gate so the same build is only
# promoted to production after smoke passes against dev. A prod deploy only ever
# runs via manual dispatch — there is no required-reviewer environment gate
# (that is a paid-plan feature not enabled on this Free private repo).
jobs:
  build:
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    uses: ./.github/workflows/shared-build-dotnet.yml
    with:
      publish: true
    secrets: inherit

  # Runs on:
  #   - push to main                                  (auto-deploy)
  #   - workflow_dispatch target-env=development      (manual dev redeploy)
  #   - workflow_dispatch target-env=both             (first leg of promotion)
  deploy-dev:
    if: |
      vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true' &&
      (
        github.event_name == 'push' ||
        github.event.inputs.target-env == 'development' ||
        github.event.inputs.target-env == 'both'
      )
    needs: build
    runs-on: ubuntu-latest
    environment: development
    # Surfaces vars.API_BASE_URL (resolved within this job's `environment: development` scope) for
    # the smoke job below — a job that calls a reusable workflow via `uses:` cannot itself declare
    # `environment:` (unsupported key for that job shape), so the value must be passed as an output.
    outputs:
      api-base-url: ${{ vars.API_BASE_URL }}
    concurrency:
      group: cd-backend-development
      cancel-in-progress: true
    permissions:
      id-token: write   # Required for OIDC token exchange with Azure
      contents: read    # Required for actions/checkout (job-level overrides workflow-level)

    steps:
      - name: Check out repository (composite action + migration source)
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github/actions/
            lc-services/

      - name: Login to Azure (OIDC — Workload Identity Federation)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0 — pinned per A08
        with:
          client-id: ${{ vars.CD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.CD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.CD_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Functions
        uses: ./.github/actions/deploy-functions
        with:
          function-app-name: ${{ vars.FUNCTION_APP_NAME }}
          resource-group: ${{ vars.RESOURCE_GROUP }}
          connection-string: ${{ vars.AZURE_SQL_CONNECTION_STRING }}
          msal-authority: ${{ vars.MSAL_AUTHORITY }}
          msal-api-client-id: ${{ vars.MSAL_API_CLIENT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          cors-allowed-origins: ${{ vars.CORS_ALLOWED_ORIGINS }}
          data-access-mode: ${{ vars.DATA_ACCESS_MODE }}
          storage-account-url: ${{ vars.STORAGE_ACCOUNT_URL }}
          storage-runtime-account-name: ${{ vars.STORAGE_RUNTIME_ACCOUNT_NAME }}
          applicationinsights-connection-string: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}

  # Smoke gate against dev. Runs whenever deploy-dev runs (push, dev-only
  # dispatch, or as the second leg of a "both" promotion). On the "both" path,
  # a smoke failure prevents deploy-prod from starting.
  smoke:
    if: |
      vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true' &&
      needs.deploy-dev.result == 'success'
    needs: deploy-dev
    uses: ./.github/workflows/smoke-dev.yml
    with:
      base-url: ${{ needs.deploy-dev.outputs.api-base-url }}
    secrets: inherit

  # Runs only on manual dispatch — prod is never auto-deployed on push to main.
  #   - workflow_dispatch target-env=production       (prod-only, no dev gate, no smoke)
  #   - workflow_dispatch target-env=both             (after smoke passes against dev)
  # The manual workflow_dispatch trigger is itself the human gate for prod.
  # NOTE: GitHub environment required-reviewer protection is a paid-plan feature
  # (Pro/Team) and is NOT enabled on this Free private repo — do not assume an
  # approval gate exists beyond the manual dispatch.
  deploy-prod:
    if: |
      always() &&
      vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true' &&
      needs.build.result == 'success' &&
      (
        (github.event.inputs.target-env == 'production' && needs.deploy-dev.result == 'skipped') ||
        (github.event.inputs.target-env == 'both' && needs.smoke.result == 'success')
      )
    needs: [build, deploy-dev, smoke]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: cd-backend-production
      cancel-in-progress: false
    permissions:
      id-token: write   # Required for OIDC token exchange with Azure
      contents: read    # Required for actions/checkout (job-level overrides workflow-level)

    steps:
      - name: Check out repository (composite action + migration source)
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github/actions/
            lc-services/

      - name: Login to Azure (OIDC — Workload Identity Federation)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0 — pinned per A08
        with:
          client-id: ${{ vars.CD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.CD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.CD_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Functions
        uses: ./.github/actions/deploy-functions
        with:
          function-app-name: ${{ vars.FUNCTION_APP_NAME }}
          resource-group: ${{ vars.RESOURCE_GROUP }}
          connection-string: ${{ vars.AZURE_SQL_CONNECTION_STRING }}
          msal-authority: ${{ vars.MSAL_AUTHORITY }}
          msal-api-client-id: ${{ vars.MSAL_API_CLIENT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          cors-allowed-origins: ${{ vars.CORS_ALLOWED_ORIGINS }}
          data-access-mode: ${{ vars.DATA_ACCESS_MODE }}
          storage-account-url: ${{ vars.STORAGE_ACCOUNT_URL }}
          storage-runtime-account-name: ${{ vars.STORAGE_RUNTIME_ACCOUNT_NAME }}
          applicationinsights-connection-string: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
