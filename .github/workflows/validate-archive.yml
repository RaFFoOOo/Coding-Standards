name: Validate Artifacts

# Cheap repo-hygiene guard:
#  - archive-guard: no closed PLAN/TEST_PLAN/EPIC/QA_REPORT artifact left at repo
#    root — enforces AGENTS.md §1 Living Plan Enforcement.
#
# Targets the main boundary: PRs into main (incl. the cumulative sprint PR) and
# pushes to main. `branches: [main]` filters the TARGET branch per
# stack-github-actions.md §1.

# Path-scoped per stack-github-actions.md §1 (Trigger Path Scoping): fire only when a
# file the guard actually reads changes. Unrelated PRs (e.g. a .claude/-only sync) no
# longer spin a runner or show a false ❌. NOT a required check (path-filtered — see the rule).
on:
  pull_request:
    branches: [main]
    # Keep identical to the push paths below (GitHub Actions does not support YAML anchors).
    paths:
      - 'PLAN_*.md'
      - 'TEST_PLAN_*.md'
      - 'EPIC_*.md'
      - 'QA_REPORT_*.md'
      - 'archive/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'scripts/ci/validate-archive.sh'
      - '.github/workflows/validate-archive.yml'
  push:
    branches: [main]
    paths:
      - 'PLAN_*.md'
      - 'TEST_PLAN_*.md'
      - 'EPIC_*.md'
      - 'QA_REPORT_*.md'
      - 'archive/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'scripts/ci/validate-archive.sh'
      - '.github/workflows/validate-archive.yml'

permissions:
  contents: read

jobs:
  guards:
    name: Repo-hygiene guards (archive)
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Closed artifacts are archived
        run: bash scripts/ci/validate-archive.sh
