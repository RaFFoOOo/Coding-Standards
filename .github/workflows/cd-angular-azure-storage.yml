name: CD - Deploy Angular to Azure Storage

on:
  workflow_dispatch:

jobs:
  build:
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    uses: ./.github/workflows/shared-build-angular.yml
    with:
      node-version: ${{ vars.NODE_VERSION || '20' }}
      working-directory: ${{ vars.ANGULAR_WORKING_DIRECTORY || '.' }}
    secrets: inherit

  deploy:
    if: vars.DISABLE_PIPELINES_FOR_TEMPLATE != 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build-output
          path: ./dist

      - name: Deploy to Azure Blob Storage
        env:
          SAS_URL: ${{ secrets.AZURE_STORAGE_BASE_URL }}/${{ secrets.AZURE_STORAGE_DEPLOY_BASE_PATH }}?${{ secrets.AZURE_STORAGE_DEPLOY_SAS_TOKEN }}
        run: |
          # Use the repository variable to route to the correct artifact subdirectory
          if [ "${{ vars.ANGULAR_WORKING_DIRECTORY }}" != "" ] && [ "${{ vars.ANGULAR_WORKING_DIRECTORY }}" != "." ]; then
            BROWSER_DIR="./dist/${{ vars.ANGULAR_WORKING_DIRECTORY }}/browser"
          else
            BROWSER_DIR="./dist/browser"
          fi
          
          echo "Syncing from directory: $BROWSER_DIR"
          
          # The azcopy tool is pre-installed on the ubuntu-latest runner
          azcopy sync "$BROWSER_DIR" "$SAS_URL" --delete-destination=true

      - name: Create and Push Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG_NAME="prod-$(date +'%Y%m%d-%H%M')"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
