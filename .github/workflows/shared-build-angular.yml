name: Shared Angular Build

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Version of Node.js to use'
        required: false
        type: string
        default: '24'
      working-directory:
        description: 'Directory containing the project package.json'
        required: false
        type: string
        default: '.'
      environment:
        description: |
          Angular CLI configuration name (passed as `--configuration <value>`),
          NOT a GitHub environment scope. Maps to angular.json configurations
          and the matching `src/environments/environment.<value>.ts` file
          replacement. Use `production` for any deployed bundle (optimized,
          minified) and `development` only for unoptimized CI / local builds.
        required: false
        type: string
        default: 'production'
      deploy-tag-prefix:
        description: 'Prefix for the generated build version tag (e.g., cd-azure-sta, cd-azure-swa). Defaults to build.'
        required: false
        type: string
        default: 'build'
      deploy-tag-suffix:
        description: 'Optional suffix appended after the date segment (e.g., branch name). Tag format: <prefix>-<date>-<suffix>.'
        required: false
        type: string
        default: ''
      upload-artifact:
        description: 'Whether to upload the build artifact. Set to false for pure CI validation runs that do not need to deploy.'
        required: false
        type: boolean
        default: true
      run-tests:
        description: 'Whether to run the unit test suite (ng test). CI sets true; CD omits (false).'
        required: false
        type: boolean
        default: false
    outputs:
      build-tag:
        description: 'The generated build version tag (e.g., cd-azure-swa-20260330-1430-main)'
        value: ${{ jobs.build.outputs.build-tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      build-tag: ${{ steps.generate-tag.outputs.build-tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'

      - name: Install Dependencies
        # --legacy-peer-deps required: @angular/build@21.2.11 declares typescript@">=5.9 <6.0"
        # (conservative/lagging range); @angular/compiler-cli accepts >=5.9 <6.1 (authoritative).
        # ng update uses legacy resolution locally; npm ci in npm v10 ignores .npmrc for ERESOLVE.
        run: npm ci --legacy-peer-deps

      - name: Audit npm dependencies
        # OWASP A06 — fail the workflow on any moderate-or-higher CVE.
        # See `.claude/rules/stack-github-actions.md` §6 Security Gates.
        run: npm audit --audit-level=moderate

      - name: Run Unit Tests
        if: inputs.run-tests
        run: npm test

      - name: Generate Build Tag
        id: generate-tag
        run: |
          TAG="${{ inputs.deploy-tag-prefix }}-$(date +'%Y%m%d-%H%M')"
          SUFFIX="${{ inputs.deploy-tag-suffix }}"
          if [ -n "$SUFFIX" ]; then
            # Sanitize: replace slashes with hyphens for git-tag and URL safety
            SUFFIX=$(echo "$SUFFIX" | tr '/' '-')
            TAG="${TAG}-${SUFFIX}"
          fi
          echo "build-tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "BUILD_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Build Application
        run: npm run build -- --configuration ${{ inputs.environment }}

      - name: Upload Build Artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: angular-build-output
          path: ${{ inputs.working-directory }}/dist/
          retention-days: 1
