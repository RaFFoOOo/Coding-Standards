name: Shared Angular Build

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Version of Node.js to use'
        required: false
        type: string
        default: '24'
      working-directory:
        description: 'Directory containing the project package.json'
        required: false
        type: string
        default: '.'
      environment:
        description: 'Angular environment configuration to build (e.g., production, development)'
        required: false
        type: string
        default: 'production'
    secrets:
      CI_DEFAULT_TENANT_ID:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Replace Environment Tokens
        env:
          ENV_TENANT_ID: ${{ vars.CI_DEFAULT_TENANT_ID }}
          ENV_ENABLE_TENANT_SELECTOR: ${{ vars.CI_ENABLE_TENANT_SELECTOR }}
        run: |
          ENV_FILE="src/environments/environment.${{ inputs.environment }}.ts"
          if [ -f "$ENV_FILE" ]; then
            node -e "
              const fs = require('fs');
              const file = '$ENV_FILE';
              let content = fs.readFileSync(file, 'utf8');
              content = content.replaceAll('__DEFAULT_TENANT_ID__', process.env.ENV_TENANT_ID || '');
              content = content.replaceAll('__ENABLE_TENANT_SELECTOR__', process.env.ENV_ENABLE_TENANT_SELECTOR || 'false');
              fs.writeFileSync(file, content);
            "
          elif [ "${{ inputs.environment }}" = "production" ]; then
            echo "::error::Environment file not found at $ENV_FILE (required for production)"
            exit 1
          else
            echo "::warning::Environment file not found at $ENV_FILE — skipping token replacement for '${{ inputs.environment }}'"
          fi

      - name: Build Application
        run: npm run build -- --configuration ${{ inputs.environment }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: angular-build-output
          path: ${{ inputs.working-directory }}/dist/
          retention-days: 7
