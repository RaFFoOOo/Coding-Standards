name: Shared Angular Build

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Version of Node.js to use'
        required: false
        type: string
        default: '20'
      working-directory:
        description: 'Directory containing the project package.json'
        required: false
        type: string
        default: '.'
      environment:
        description: 'Angular environment configuration to build (e.g., production, development)'
        required: false
        type: string
        default: 'production'
    secrets:
      AZURE_STORAGE_BASE_URL:
        required: false
      AZURE_STORAGE_IMG_BASE_PATH:
        required: false
      AZURE_STORAGE_IMG_SAS_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Replace Environment Tokens
        env:
          BLOB_URL: ${{ secrets.AZURE_STORAGE_BASE_URL }}
          IMG_PATH: ${{ secrets.AZURE_STORAGE_IMG_BASE_PATH }}
          SAS_TOKEN: ${{ secrets.AZURE_STORAGE_IMG_SAS_TOKEN }}
        run: |
          ENV_FILE="src/environments/environment.${{ inputs.environment }}.ts"
          if [ -f "$ENV_FILE" ]; then
            node -e "
              const fs = require('fs');
              const file = '$ENV_FILE';
              let content = fs.readFileSync(file, 'utf8');
              content = content.replaceAll('__AZURE_STORAGE_BASE_URL__', process.env.BLOB_URL || '');
              content = content.replaceAll('__AZURE_STORAGE_IMG_BASE_PATH__', process.env.IMG_PATH || '');
              content = content.replaceAll('__AZURE_STORAGE_IMG_SAS_TOKEN__', process.env.SAS_TOKEN || '');
              fs.writeFileSync(file, content);
            "
          else
            echo "Environment file not found at $ENV_FILE"
            exit 1
          fi

      - name: Build Application
        run: npm run build -- --configuration ${{ inputs.environment }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build-output
          path: ${{ inputs.working-directory }}/dist/
          retention-days: 7
