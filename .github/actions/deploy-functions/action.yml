name: Deploy to Azure Function App
description: Checks out source, applies EF Core migrations, injects app settings, and deploys the published artifact to an Azure Function App.

inputs:
  function-app-name:
    description: 'Azure Function App name'
    required: true
  resource-group:
    description: 'Azure resource group containing the Function App'
    required: true
  connection-string:
    description: 'Azure SQL connection string (used for migrations and runtime settings)'
    required: true
  msal-authority:
    description: 'MSAL/Entra authority URL (AzureAd__Authority)'
    required: true
  msal-api-client-id:
    description: 'lc-services-api app registration client ID (AzureAd__ClientId + Audience)'
    required: true
  azure-client-id:
    description: 'User-Assigned Managed Identity client ID (AZURE_CLIENT_ID)'
    required: true
  cors-allowed-origins:
    description: 'CORS allowed origins — comma-separated list (CORS__AllowedOrigins). Supports several SWAs + default URL + custom domain.'
    required: true
  data-access-mode:
    description: 'Data access mode, e.g. Database (DATA_ACCESS_MODE)'
    required: true
  storage-account-url:
    description: 'Content storage account URL (STORAGE_ACCOUNT_URL)'
    required: true
  storage-runtime-account-name:
    description: 'Runtime storage account name for WebJobs and content share (STORAGE_RUNTIME_ACCOUNT_NAME)'
    required: true
  applicationinsights-connection-string:
    description: 'Application Insights connection string (APPLICATIONINSIGHTS_CONNECTION_STRING)'
    required: true
  artifact-name:
    description: 'Name of the build artifact to download and deploy'
    required: false
    default: 'dotnet-publish-output'

runs:
  using: composite
  steps:
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    # Skip in Mock-mode deployments — there's no SQL backend to migrate.
    # Case-sensitive: vars.DATA_ACCESS_MODE must be exactly "Database".
    - name: Apply EF Core migrations
      if: inputs.data-access-mode == 'Database'
      shell: bash
      run: |
        if [[ -z "${AZURE_SQL_CONNECTION_STRING:-}" || "${AZURE_SQL_CONNECTION_STRING}" == "-" ]]; then
          echo "::error::AZURE_SQL_CONNECTION_STRING is empty or unset. Set vars.AZURE_SQL_CONNECTION_STRING in the GitHub environment via scripts/azure-setup/set-github-vars.sh."
          exit 1
        fi
        cd lc-services
        dotnet tool restore
        dotnet restore
        dotnet ef database update \
          --project LcServices.DataAccess \
          --startup-project LcServices.Functions
      env:
        AZURE_SQL_CONNECTION_STRING: ${{ inputs.connection-string }}

    - name: Inject Function App Settings
      shell: bash
      run: |
        # AzureWebJobsStorage (key-based) is superseded by AzureWebJobsStorage__accountName (MI).
        # WEBSITE_CONTENTAZUREFILECONNECTIONSTRING is intentionally NOT touched here:
        # Azure Functions consumption plan does NOT support managed identity for the content
        # share — it requires a key-based connection string. That setting is provisioned once
        # via scripts/azure-setup/set-github-vars.sh and must remain stable across deploys.
        az functionapp config appsettings delete \
          --name "${{ inputs.function-app-name }}" \
          --resource-group "${{ inputs.resource-group }}" \
          --setting-names AzureWebJobsStorage WEBSITE_CONTENTAZUREFILECONNECTIONSTRING__accountName 2>/dev/null || true

        az functionapp config appsettings set \
          --name "${{ inputs.function-app-name }}" \
          --resource-group "${{ inputs.resource-group }}" \
          --settings \
            "AzureAd__Authority=${{ inputs.msal-authority }}" \
            "AzureAd__ClientId=${{ inputs.msal-api-client-id }}" \
            "AzureAd__Audience=${{ inputs.msal-api-client-id }}" \
            "AzureWebJobsStorage__accountName=${{ inputs.storage-runtime-account-name }}" \
            "AZURE_CLIENT_ID=${{ inputs.azure-client-id }}" \
            "AZURE_SQL_CONNECTION_STRING=${{ inputs.connection-string }}" \
            "CORS__AllowedOrigins=${{ inputs.cors-allowed-origins }}" \
            "DATA_ACCESS_MODE=${{ inputs.data-access-mode }}" \
            "STORAGE_ACCOUNT_URL=${{ inputs.storage-account-url }}" \
            "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ inputs.applicationinsights-connection-string }}"

    - name: Download Build Artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact-name }}
        path: ./publish

    - name: Package artifact as zip
      shell: bash
      run: |
        cd publish
        zip -r ../publish.zip .
        cd ..
        echo "Package size: $(du -sh publish.zip)"

    - name: Deploy to Function App
      shell: bash
      # Uses Azure CLI zip deploy via ARM management plane instead of Kudu SCM.
      # azure/functions-action consistently returned HTTP 500 from Kudu on this
      # consumption-plan Function App — az functionapp deploy bypasses that endpoint.
      run: |
        az functionapp deploy \
          --name "${{ inputs.function-app-name }}" \
          --resource-group "${{ inputs.resource-group }}" \
          --src-path publish.zip \
          --type zip \
          --async true

    - name: Restart Function App
      shell: bash
      # `az resource invoke-action --action syncfunctiontriggers` (tried in a prior commit)
      # completed successfully (empty {} response, no error) but did NOT fix a real, reproduced
      # 404 on a brand-new HTTP route — ruling out "just needs a trigger resync". For the .NET
      # isolated-worker model specifically, the function list is reported by the *worker process*
      # to the host via a gRPC handshake at worker startup, not read directly from disk by the
      # host — a host-side trigger sync doesn't necessarily make the worker re-announce its
      # functions. An explicit restart forces the worker process to terminate and restart,
      # redoing that handshake against the freshly-deployed assembly.
      run: |
        az functionapp restart \
          --name "${{ inputs.function-app-name }}" \
          --resource-group "${{ inputs.resource-group }}"
        sleep 30
